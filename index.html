<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- SEO Meta Tags -->
  <title>TruckerSocial Marketplace - Master Catalogue & Filter Schema</title>
  <meta name="description" content="Explore, filter, and publish commercial transportation listings in the TruckerSocial Marketplace. 12 parent categories, 94 subcategories, and 113 filter fields.">
  <meta name="keywords" content="trucking marketplace, commercial vehicle listing, semi trucks, trailers, yard equipment, dispatcher B2B services, owner operator lease to own">
  
  <!-- Theme Stylesheet -->
  <link rel="stylesheet" href="index.css">
</head>
<body>
  
  <div class="app-container">
    
    <!-- Left Sidebar Menu -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <img src="logo.svg" alt="TruckerSocial Logo">
      </div>
      <ul class="sidebar-menu">
        <li class="sidebar-item">
          <a href="#" class="sidebar-link">
            <!-- Home Icon -->
            <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span>Home</span>
          </a>
        </li>
        <li class="sidebar-item">
          <a href="#" class="sidebar-link">
            <!-- Job Board Icon -->
            <svg viewBox="0 0 24 24"><path d="M20 6h-4V4c0-1.11-.89-2-2-2h-4c-1.11 0-2 .89-2 2v2H4c-1.11 0-1.99.89-1.99 2L2 19c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2zm-6 0h-4V4h4v2z"/></svg>
            <span>Job Board</span>
          </a>
        </li>
        <li class="sidebar-item active">
          <a href="#" class="sidebar-link">
            <!-- Marketplace Icon -->
            <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-8 11c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm6-6h-3V7h3v2z"/></svg>
            <span>Marketplace</span>
          </a>
        </li>
        <li class="sidebar-item">
          <a href="#" class="sidebar-link">
            <!-- Find Friends Icon -->
            <svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
            <span>Find Friends</span>
          </a>
        </li>
        <li class="sidebar-item">
          <a href="#" class="sidebar-link">
            <!-- Chat Room Icon -->
            <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 9h12v2H6V9zm8 5H6v-2h8v2zm4-6H6V6h12v2z"/></svg>
            <span>Chat Room</span>
          </a>
        </li>
        <li class="sidebar-item">
          <a href="#" class="sidebar-link">
            <!-- Create Post Icon -->
            <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
            <span>Create Post</span>
          </a>
        </li>
        <li class="sidebar-item">
          <a href="#" class="sidebar-link">
            <!-- Smart Driver Application Icon -->
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
            <span>Smart Driver App</span>
          </a>
        </li>
      </ul>
    </aside>
    
    <!-- Main App Frame -->
    <div class="main-wrapper">
      
      <!-- Top Sticky Header -->
      <header class="header">
        <div class="header-title-area">
          <h1>Marketplace Portal</h1>
        </div>
        
        <!-- Toggle Browse / Create Mode -->
        <div class="mode-switcher">
          <button class="mode-btn active" id="mode-browse">
            <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            Browse Listings
          </button>
          <button class="mode-btn" id="mode-create">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5 11h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"/></svg>
            Post a Listing
          </button>
        </div>
        
        <!-- User Profile (Matches screenshot) -->
        <div class="user-profile-badge">
          <div class="profile-completion-card">
            <span class="profile-completion-label">Profile Completion</span>
            <div class="completion-bar-outer">
              <div class="completion-bar-inner"></div>
            </div>
            <span class="completion-percent">31%</span>
          </div>
          <div class="user-avatar-container">
            <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?q=80&w=150&auto=format&fit=crop" alt="User Avatar" class="user-avatar">
            <div class="user-details">
              <span class="user-name">Zaved Ali</span>
              <span class="user-email">zavedfornimcet2022@gmail.com</span>
            </div>
          </div>
        </div>
      </header>
      
      <!-- Top Collapseable Filter Drawer (Browse Mode only) -->
      <div class="filter-drawer-shell" id="filter-drawer-shell">
        <button class="filter-drawer-toggle" id="filter-drawer-toggle" onclick="toggleFilterDrawer()">
          <div class="drawer-toggle-left">
            <svg viewBox="0 0 24 24"><path d="M10 18h4v-2h-4v2zM3 6v2h18V6H3zm3 7h12v-2H6v2z"/></svg>
            <span>Filters &amp; Category</span>
            <span class="drawer-active-badge" id="drawer-active-badge" style="display:none;"></span>
          </div>
          <div class="drawer-toggle-right">
            <span class="drawer-toggle-hint" id="drawer-toggle-hint">Click to expand</span>
            <svg class="drawer-chevron" id="drawer-chevron" viewBox="0 0 24 24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/></svg>
          </div>
        </button>

        <div class="filter-drawer-body" id="filter-drawer-body">
          <!-- Category Selector inside drawer -->
          <div class="drawer-category-section">
            <div class="drawer-section-label">
              <svg viewBox="0 0 24 24"><path d="M12 2l-5.5 9h11z"/><circle cx="17.5" cy="17.5" r="4.5"/><rect x="3" y="13" width="8" height="8"/></svg>
              Select Marketplace Category
            </div>
            <div class="category-grid" id="categories-grid">
              <!-- Dynamically populated by app.js -->
            </div>
          </div>

          <!-- Dynamic Filter Fields (config panel embedded in drawer) -->
          <div class="drawer-filter-section" id="config-panel-container">
            <!-- Dynamically generated inputs based on selected category & subcategory -->
          </div>
        </div>
      </div>

      <!-- Main Content: Marketplace Cards Grid -->
      <main class="marketplace-main" id="marketplace-main">

        <!-- Browse Mode: Cards Area -->
        <div class="marketplace-browse-area" id="browse-area">
          <!-- Header bar -->
          <div class="browse-results-header" id="browse-results-header">
            <div class="browse-results-meta" id="browse-results-meta">
              <span id="browse-count-label">Browse All Listings</span>
            </div>
            <div class="browse-view-controls">
              <button class="view-toggle-btn active" id="view-grid-btn" onclick="setListingView('grid')" title="Grid View">
                <svg viewBox="0 0 24 24"><path d="M3 3h7v7H3zm11 0h7v7h-7zM3 14h7v7H3zm11 0h7v7h-7z"/></svg>
              </button>
              <button class="view-toggle-btn" id="view-list-btn" onclick="setListingView('list')" title="List View">
                <svg viewBox="0 0 24 24"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg>
              </button>
            </div>
          </div>

          <!-- Marketplace Cards / Results -->
          <div id="marketplace-cards-container">
            <!-- Populated by JS -->
          </div>
        </div>

        <!-- Create Mode Area -->
        <div class="create-mode-area" id="create-mode-area" style="display:none;">
          <div class="create-mode-grid">
            <!-- Left: Form -->
            <section class="config-panel-create" id="config-panel-create-container">
            </section>
            <!-- Right: Preview -->
            <section class="preview-sticky-panel" id="preview-sticky-panel-container">
            </section>
          </div>
        </div>

      </main>
      
    </div>
    
  </div>

  <!-- Main logic runner script -->
  <script src="app.js"></script>
</body>
</html>
